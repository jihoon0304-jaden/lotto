<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>로또 패턴 분석기</title>
<script src="lotto_data.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Malgun Gothic',sans-serif;background:#1a1a2e;color:#eee;min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:15px}
h1{text-align:center;color:#e94560;font-size:26px;margin:15px 0}
h2{color:#e94560;font-size:18px;margin:12px 0 8px 0;border-bottom:2px solid #e94560;padding-bottom:5px}
h3{color:#ffd700;font-size:15px;margin:8px 0 5px 0}
.section{background:#16213e;border-radius:12px;padding:15px;margin:12px 0;border:1px solid #0f3460}
.input-row{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin:8px 0}
.input-row input{width:46px;height:36px;text-align:center;font-size:16px;font-weight:bold;border:2px solid #0f3460;border-radius:8px;background:#1a1a2e;color:#ffd700}
.input-row input:focus{border-color:#e94560;outline:none}
.input-row label{color:#aaa;font-size:13px;margin-right:3px}
button{padding:9px 16px;font-size:14px;font-weight:bold;border:none;border-radius:8px;cursor:pointer;margin:4px}
.btn-save{background:#e94560;color:white}
.btn-save:hover{background:#c81e45}
.btn-refresh{background:#ff6600;color:white;font-size:15px;padding:11px 22px}
.btn-refresh:hover{background:#cc5200}
.btn-confirm{background:#00cc66;color:white;font-size:12px;padding:7px 12px}
.btn-confirm:hover{background:#009944}
.btn-delete{background:#cc3333;color:white;font-size:11px;padding:5px 10px}
.btn-delete:hover{background:#aa1111}
.btn-reset{background:#333;color:#aaa}
.btn-reset:hover{background:#555}
.game-card{background:#0f3460;border-radius:10px;padding:12px;margin:8px 0;border-left:4px solid #ffd700}
.game-card.grade-S{border-left-color:#ff0000}
.game-card.grade-A{border-left-color:#ff6600}
.game-card.grade-B{border-left-color:#ffd700}
.game-card.grade-C{border-left-color:#00cc66}
.ball{display:inline-block;width:34px;height:34px;line-height:34px;text-align:center;border-radius:50%;font-weight:bold;font-size:14px;margin:2px;color:white}
.ball-1{background:#fbc400}.ball-2{background:#69c8f2}.ball-3{background:#ff7272}.ball-4{background:#aaa}.ball-5{background:#b0d840}
.pattern-info{color:#aaa;font-size:12px;margin-top:4px}
.no-dup{color:#66ff66;font-size:11px;margin-top:3px}
.stats-table{width:100%;border-collapse:collapse;margin:8px 0}
.stats-table th{background:#0f3460;color:#ffd700;padding:6px;text-align:center;font-size:12px}
.stats-table td{padding:6px;text-align:center;border-bottom:1px solid #1a1a2e;font-size:12px}
.stats-table tr:hover{background:#1a1a5e}
.hot-number{display:inline-block;width:32px;height:32px;line-height:16px;text-align:center;border-radius:50%;font-weight:bold;font-size:13px;margin:2px;padding-top:4px}
.hot-high{background:#e94560;color:white}.hot-mid{background:#ff6600;color:white}
.hot-low{background:#0f3460;color:#ffd700;border:1px solid #ffd700}
.pattern-bar{display:flex;gap:2px;margin:5px 0}
.pattern-bar-item{height:20px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:10px;color:white}
.msg{padding:8px;border-radius:8px;margin:8px 0;font-size:13px}
.msg-success{background:#1a4a1a;color:#66ff66;border:1px solid #33aa33}
.msg-info{background:#1a1a4a;color:#6699ff;border:1px solid #3355aa}
.msg-warn{background:#4a4a1a;color:#ffff66;border:1px solid #aaaa33}
.msg-match{background:#4a1a1a;color:#ff6666;border:2px solid #ff0000;font-size:15px;padding:12px}
.last-draw{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:8px;background:#1a1a2e;border-radius:8px;margin:8px 0}
.last-draw span{color:#aaa;font-size:13px}
.my-card{background:#0f3460;border-radius:10px;padding:10px;margin:7px 0;border-left:4px solid #00cc66;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.my-card .match-info{font-size:12px;padding:3px 7px;border-radius:5px}
.match-6{background:#ff0000;color:white;font-weight:bold;font-size:15px}
.match-5{background:#ff6600;color:white;font-weight:bold}
.match-4{background:#ffd700;color:#333}
.match-3{background:#00cc66;color:white}
.match-low{background:#333;color:#888}
.sync-status{text-align:center;padding:5px;font-size:11px;border-radius:5px;margin:5px 0}
.sync-ok{background:#1a4a1a;color:#66ff66}
.sync-err{background:#4a1a1a;color:#ff6666}
.footer{text-align:center;color:#555;font-size:11px;margin:20px 0 10px 0}
.grade-badge{display:inline-block;padding:2px 8px;border-radius:5px;font-weight:bold;font-size:11px;margin-right:5px}
@media(max-width:600px){
.container{padding:8px}
h1{font-size:20px;margin:10px 0}
h2{font-size:15px}
h3{font-size:13px}
.section{padding:10px;margin:8px 0}
.ball{width:28px;height:28px;line-height:28px;font-size:11px;margin:1px}
.input-row{gap:3px}
.input-row input{width:36px;height:32px;font-size:14px}
.input-row label{font-size:11px;margin-right:2px}
button{padding:7px 10px;font-size:12px;margin:2px}
.btn-refresh{font-size:13px;padding:9px 15px}
.btn-confirm{font-size:11px;padding:5px 8px}
.game-card{padding:8px}
.stats-table th,.stats-table td{padding:4px;font-size:10px}
.hot-number{width:28px;height:28px;line-height:14px;font-size:11px;margin:1px;padding-top:3px}
.my-card{padding:7px}
.pattern-info{font-size:10px}
.no-dup{font-size:9px}
.grade-badge{font-size:10px;padding:2px 5px}
.msg{font-size:11px;padding:6px}
.msg-match{font-size:13px;padding:8px}
.last-draw span{font-size:11px}
.footer{font-size:10px}
}
</style>
</head>
<body>
<div class="container">
<h1>🎱 로또 패턴 분석기</h1>
<div id="syncStatus" class="sync-status"></div>
<div id="matchAlert"></div>

<div class="section">
<h2>📌 최근 당첨번호</h2>
<div id="lastDraw" class="last-draw"></div>
</div>

<div class="section">
<h2>✏️ 새 당첨번호 입력</h2>
<div class="input-row">
<label>회차:</label>
<input type="number" id="inputRound" style="width:65px;">
<label>번호:</label>
<input type="number" id="n1" min="1" max="45">
<input type="number" id="n2" min="1" max="45">
<input type="number" id="n3" min="1" max="45">
<input type="number" id="n4" min="1" max="45">
<input type="number" id="n5" min="1" max="45">
<input type="number" id="n6" min="1" max="45">
<label>보너스:</label>
<input type="number" id="nBonus" min="1" max="45">
</div>
<div>
<button class="btn-save" onclick="saveNewDraw()">💾 저장하기</button>
<button class="btn-reset" onclick="resetInput()">🔄 초기화</button>
</div>
<div id="saveMsg"></div>
</div>

<div class="section">
<h2>🎯 추천 5게임</h2>
<p style="color:#aaa;font-size:12px;margin-bottom:5px;">✅ 과거 1등 당첨 이력 없는 번호만 추천</p>
<div style="margin:8px 0;">
<button class="btn-refresh" onclick="generateRecommendations()">🔄 번호 다시 뽑기</button>
</div>
<div id="recommendations"></div>
</div>

<div class="section">
<h2>💰 내 확정 번호 저장소</h2>
<p style="color:#aaa;font-size:12px;margin-bottom:8px;">확정한 번호는 서버에 자동 저장! ☁️</p>
<div id="myNumbers"></div>
</div>
<div class="section">
<h2>📊 패턴 분석 (1등 전 등수 경로)</h2>
<div id="patternStats"></div>
</div>

<div class="section">
<h2>🔥 핫넘버 (최근 100회 출현 빈도)</h2>
<div id="hotNumbers"></div>
</div>

<div class="section">
<h2>📋 최근 20회 당첨번호</h2>
<div id="recentData"></div>
</div>

<div class="footer">
로또 패턴 분석기 v3.0 ☁️ Firebase Cloud<br>
※ 참고용이며 당첨을 보장하지 않습니다
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBdLvfI1ItgRLtGs1qFLBMjZIn3tPaI3Nw",
    authDomain: "lottl-jihoon.firebaseapp.com",
    projectId: "lottl-jihoon",
    storageBucket: "lottl-jihoon.firebasestorage.app",
    messagingSenderId: "814020270032",
    appId: "1:814020270032:web:e4895c727d7d1e00ed0bd5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
window.fireDB = db;
window.fireCollection = collection;
window.fireDoc = doc;
window.fireSetDoc = setDoc;
window.fireGetDocs = getDocs;
window.fireDeleteDoc = deleteDoc;
window.firebaseReady = true;
window.dispatchEvent(new Event('firebaseReady'));
</script>

<script>
let allData = [];

function initData() {
    allData = LOTTO_DATA.map(d => ({
        round: d[0], numbers: [d[1],d[2],d[3],d[4],d[5],d[6]], bonus: d[7]
    }));
    let extra = JSON.parse(localStorage.getItem('lotto_extra') || '[]');
    extra.forEach(d => {
        if (!allData.find(x => x.round === d.round)) allData.push(d);
    });
    allData.sort((a, b) => a.round - b.round);
}

async function loadFromFirebase() {
    try {
        let snapshot = await window.fireGetDocs(window.fireCollection(window.fireDB, 'draws'));
        snapshot.forEach(docSnap => {
            let d = docSnap.data();
            if (!allData.find(x => x.round === d.round)) {
                allData.push({ round: d.round, numbers: d.numbers, bonus: d.bonus });
            }
        });
        allData.sort((a, b) => a.round - b.round);
        let extra = allData.filter(d => d.round > LOTTO_DATA[LOTTO_DATA.length-1][0]);
        localStorage.setItem('lotto_extra', JSON.stringify(extra));
        document.getElementById('syncStatus').innerHTML = '☁️ 서버 연결 완료! (총 ' + allData.length + '회차)';
        document.getElementById('syncStatus').className = 'sync-status sync-ok';
        refreshAll();
    } catch(e) {
        document.getElementById('syncStatus').innerHTML = '⚠️ 서버 연결 실패 - 로컬 데이터 사용 중';
        document.getElementById('syncStatus').className = 'sync-status sync-err';
    }
}

async function loadMyNumbersFromFirebase() {
    try {
        let snapshot = await window.fireGetDocs(window.fireCollection(window.fireDB, 'myNumbers'));
        let myNums = [];
        snapshot.forEach(docSnap => {
            let d = docSnap.data();
            d.id = parseInt(docSnap.id);
            myNums.push(d);
        });
        if (myNums.length > 0) localStorage.setItem('my_lotto_numbers', JSON.stringify(myNums));
        showMyNumbers();
        checkMyMatches();
    } catch(e) { console.log('내 번호 로드 에러:', e); }
}

async function saveNewDraw() {
    let round = parseInt(document.getElementById('inputRound').value);
    let nums = [];
    for (let i = 1; i <= 6; i++) {
        let v = parseInt(document.getElementById('n' + i).value);
        if (isNaN(v) || v < 1 || v > 45) {
            showMsg('saveMsg', '❌ 번호를 1~45 사이로 입력해주세요!', 'msg-warn');
            return;
        }
        nums.push(v);
    }
    let bonus = parseInt(document.getElementById('nBonus').value);
    if (isNaN(bonus) || bonus < 1 || bonus > 45) {
        showMsg('saveMsg', '❌ 보너스 번호를 입력해주세요!', 'msg-warn');
        return;
    }
    if (isNaN(round) || round < 1) {
        showMsg('saveMsg', '❌ 회차를 입력해주세요!', 'msg-warn');
        return;
    }
    if (allData.find(x => x.round === round)) {
        showMsg('saveMsg', '⚠️ ' + round + '회차는 이미 있습니다!', 'msg-warn');
        return;
    }
    nums.sort((a, b) => a - b);
    let newDraw = { round: round, numbers: nums, bonus: bonus };
    let extra = JSON.parse(localStorage.getItem('lotto_extra') || '[]');
    extra.push(newDraw);
    localStorage.setItem('lotto_extra', JSON.stringify(extra));
    try {
        await window.fireSetDoc(window.fireDoc(window.fireDB, 'draws', String(round)), newDraw);
        showMsg('saveMsg', '✅ ' + round + '회 저장완료! ☁️ 서버 저장 OK', 'msg-success');
    } catch(e) {
        showMsg('saveMsg', '✅ ' + round + '회 로컬 저장완료 (서버는 다음에 동기화)', 'msg-warn');
    }
    allData.push(newDraw);
    allData.sort((a, b) => a.round - b.round);
    resetInput();
    refreshAll();
}

function resetInput() {
    document.getElementById('inputRound').value = '';
    for (let i = 1; i <= 6; i++) document.getElementById('n' + i).value = '';
    document.getElementById('nBonus').value = '';
}

function showMsg(id, text, cls) {
    document.getElementById(id).innerHTML = '<div class="msg ' + cls + '">' + text + '</div>';
    setTimeout(() => { document.getElementById(id).innerHTML = ''; }, 5000);
}

function getBallClass(n) {
    if (n <= 10) return 'ball-1'; if (n <= 20) return 'ball-2';
    if (n <= 30) return 'ball-3'; if (n <= 40) return 'ball-4'; return 'ball-5';
}
function makeBall(n) { return '<span class="ball ' + getBallClass(n) + '">' + n + '</span>'; }

function countMatches(nums1, nums2) {
    let c = 0;
    for (let i = 0; i < nums1.length; i++)
        for (let j = 0; j < nums2.length; j++)
            if (nums1[i] === nums2[j]) c++;
    return c;
}

function analyzePattern(idx) {
    let t = allData[idx], m3 = 0, m4 = 0, m5 = 0;
    for (let i = 0; i < idx; i++) {
        let m = countMatches(t.numbers, allData[i].numbers);
        if (m === 3) m3++; if (m === 4) m4++; if (m === 5) m5++;
    }
    return { match3: m3, match4: m4, match5: m5 };
}

function getGrade(p) {
    if (p.match5 >= 1) return 'S'; if (p.match4 >= 2) return 'A';
    if (p.match4 >= 1 && p.match3 >= 1) return 'B'; if (p.match3 >= 1) return 'C'; return 'D';
}

function getGradeColor(g) {
    if (g==='S') return '#ff0000'; if (g==='A') return '#ff6600';
    if (g==='B') return '#ffd700'; if (g==='C') return '#00cc66'; return '#6666ff';
}

function isAlreadyWon(nums) {
    let s = nums.slice().sort((a,b)=>a-b).join(',');
    for (let i = 0; i < allData.length; i++) {
        if (allData[i].numbers.slice().sort((a,b)=>a-b).join(',') === s) return true;
    }
    return false;
}
function getMyNumbers() { return JSON.parse(localStorage.getItem('my_lotto_numbers') || '[]'); }

async function saveMyNumber(nums, grade, label) {
    let myNums = getMyNumbers();
    let today = new Date();
    let dateStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
    let id = Date.now();
    let newEntry = {
        id: id, numbers: nums.slice().sort((a,b)=>a-b), grade: grade,
        label: label, date: dateStr, savedAtRound: allData[allData.length-1].round
    };
    myNums.push(newEntry);
    localStorage.setItem('my_lotto_numbers', JSON.stringify(myNums));
    try { await window.fireSetDoc(window.fireDoc(window.fireDB, 'myNumbers', String(id)), newEntry); } catch(e) {}
    showMyNumbers(); checkMyMatches();
    alert('✅ 번호 확정 저장!\n[' + nums.sort((a,b)=>a-b).join(', ') + ']\n☁️ 서버 저장 완료!');
}

async function deleteMyNumber(id) {
    if (!confirm('삭제하시겠습니까?')) return;
    let myNums = getMyNumbers().filter(m => m.id !== id);
    localStorage.setItem('my_lotto_numbers', JSON.stringify(myNums));
    try { await window.fireDeleteDoc(window.fireDoc(window.fireDB, 'myNumbers', String(id))); } catch(e) {}
    showMyNumbers();
}

function showMyNumbers() {
    let myNums = getMyNumbers();
    let html = '';
    if (myNums.length === 0) {
        html = '<div class="msg msg-info">아직 확정한 번호가 없습니다. 추천 게임에서 "✅ 확정" 버튼을 눌러보세요!</div>';
    } else {
        html += '<div style="color:#ffd700;font-size:13px;margin-bottom:8px;">총 <b>' + myNums.length + '</b>개 저장됨 ☁️</div>';
        myNums.slice().reverse().forEach(m => {
            let bestMatch = 0, bestRound = 0, bestBonus = false;
            for (let i = 0; i < allData.length; i++) {
                if (allData[i].round <= m.savedAtRound) continue;
                let mc = countMatches(m.numbers, allData[i].numbers);
                if (mc > bestMatch) { bestMatch = mc; bestRound = allData[i].round; bestBonus = (m.numbers.indexOf(allData[i].bonus) !== -1); }
            }
            html += '<div class="my-card"><div>';
            html += '<span class="grade-badge" style="background:' + getGradeColor(m.grade) + '">' + m.grade + '</span>';
            html += '<span style="color:#aaa;font-size:11px;">' + m.date + ' (' + m.savedAtRound + '회 기준)</span><br>';
            html += '<div style="margin:4px 0;">';
            m.numbers.forEach(n => { html += makeBall(n); });
            html += '</div>';
            if (bestMatch >= 3) {
                let cls = 'match-low', txt = '';
                if (bestMatch === 6) { cls = 'match-6'; txt = '🎉 1등!! (' + bestRound + '회)'; }
                else if (bestMatch === 5 && bestBonus) { cls = 'match-5'; txt = '🎊 2등! (' + bestRound + '회)'; }
                else if (bestMatch === 5) { cls = 'match-5'; txt = '🎊 3등! (' + bestRound + '회)'; }
                else if (bestMatch === 4) { cls = 'match-4'; txt = '4등 (' + bestRound + '회)'; }
                else if (bestMatch === 3) { cls = 'match-3'; txt = '5등 (' + bestRound + '회)'; }
                html += '<span class="match-info ' + cls + '">' + txt + ' ' + bestMatch + '개 일치</span>';
            } else if (bestRound > 0) {
                html += '<span class="match-info match-low">3개 이상 일치 없음</span>';
            } else {
                html += '<span class="match-info match-low">다음 추첨 대기중...</span>';
            }
            html += '</div><button class="btn-delete" onclick="deleteMyNumber(' + m.id + ')">🗑️</button></div>';
        });
    }
    document.getElementById('myNumbers').innerHTML = html;
}

function checkMyMatches() {
    let myNums = getMyNumbers();
    if (myNums.length === 0) return;
    let last = allData[allData.length - 1];
    let alertHtml = '';
    myNums.forEach(m => {
        if (m.savedAtRound >= last.round) return;
        let mc = countMatches(m.numbers, last.numbers);
        let hb = (m.numbers.indexOf(last.bonus) !== -1);
        if (mc === 6) alertHtml += '<div class="msg msg-match">🎉🎉🎉 [' + m.numbers.join(', ') + '] → ' + last.round + '회 <b>1등!!</b></div>';
        else if (mc === 5 && hb) alertHtml += '<div class="msg msg-match">🎊🎊 [' + m.numbers.join(', ') + '] → ' + last.round + '회 <b>2등!</b></div>';
        else if (mc === 5) alertHtml += '<div class="msg msg-match">🎊 [' + m.numbers.join(', ') + '] → ' + last.round + '회 <b>3등!</b></div>';
        else if (mc === 4) alertHtml += '<div class="msg" style="background:#3a3a1a;color:#ffcc00;border:1px solid #aa8800;">🎯 [' + m.numbers.join(', ') + '] → ' + last.round + '회 <b>4등</b></div>';
        else if (mc === 3) alertHtml += '<div class="msg msg-info">✨ [' + m.numbers.join(', ') + '] → ' + last.round + '회 <b>5등</b></div>';
    });
    document.getElementById('matchAlert').innerHTML = alertHtml;
}

function generateRecommendations() {
    let freq = {};
    for (let i = 1; i <= 45; i++) freq[i] = 0;
    allData.slice(-100).forEach(d => { d.numbers.forEach(n => { freq[n]++; }); });
    let sorted = Object.keys(freq).map(k => ({num:parseInt(k), count:freq[k]}));
    sorted.sort((a, b) => b.count - a.count);
    let hotNums = sorted.slice(0, 20).map(s => s.num);
    let midNums = sorted.slice(10, 30).map(s => s.num);

    let m4F = {}; for (let i = 1; i <= 45; i++) m4F[i] = 0;
    let si = Math.max(0, allData.length - 300);
    for (let i = si; i < allData.length; i++) {
        let p = analyzePattern(i);
        if (p.match4 >= 2) allData[i].numbers.forEach(n => { m4F[n] += 2; });
        else if (p.match4 >= 1) allData[i].numbers.forEach(n => { m4F[n]++; });
    }
    let m4S = Object.keys(m4F).map(k => ({num:parseInt(k), score:m4F[k]}));
    m4S.sort((a, b) => b.score - a.score);
    let strongNums = m4S.slice(0, 15).map(s => s.num);

    let m5F = {}; for (let i = 1; i <= 45; i++) m5F[i] = 0;
    for (let i = si; i < allData.length; i++) {
        let p = analyzePattern(i);
        if (p.match5 >= 1) allData[i].numbers.forEach(n => { m5F[n] += 3; });
    }
    let m5S = Object.keys(m5F).map(k => ({num:parseInt(k), score:m5F[k]}));
    m5S.sort((a, b) => b.score - a.score);
    let eliteNums = m5S.filter(s => s.score > 0).slice(0, 15).map(s => s.num);

    let ts = {}; for (let i = 1; i <= 45; i++) ts[i] = 0;
    sorted.forEach((s, idx) => { ts[s.num] += (45 - idx); });
    m4S.forEach(s => { ts[s.num] += s.score * 2; });
    m5S.forEach(s => { ts[s.num] += s.score * 3; });
    let fs = Object.keys(ts).map(k => ({num:parseInt(k), score:ts[k]}));
    fs.sort((a, b) => b.score - a.score);

    let games = [
        {grade:'S', label:'S등급: 5등3+4등2', desc:'집중도 최고, 4등 패턴 강세'},
        {grade:'A', label:'A등급: 3등 경험 희귀', desc:'5개 일치 이력 숫자 중심'},
        {grade:'A', label:'A등급: 4등 다수 검증', desc:'4등 2회 이상 검증된 조합'},
        {grade:'B', label:'B등급: 현실적 안정', desc:'최근 출현 빈도 높은 조합'},
        {grade:'C', label:'C등급: 성장형 기대', desc:'5등 다수 축적, 상승 기대'}
    ];
    let pools = [
        {scored:fs, prefer:strongNums},
        {scored:fs, prefer:eliteNums.length>0?eliteNums:strongNums},
        {scored:m4S, prefer:hotNums},
        {scored:sorted, prefer:midNums},
        {scored:sorted, prefer:sorted.map(s=>s.num)}
    ];
    let allUsed = [];
    for (let g = 0; g < 5; g++) {
        let att = 0, nums;
        do { nums = pickNumbers(pools[g].scored, pools[g].prefer, 6, allUsed); att++; }
        while (isAlreadyWon(nums) && att < 50);
        games[g].nums = nums.sort((a,b)=>a-b);
        allUsed = allUsed.concat(nums);
    }

    let html = '';
    games.forEach((g, idx) => {
        html += '<div class="game-card grade-' + g.grade + '">';
        html += '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:5px;">';
        html += '<div><span class="grade-badge">' + g.grade + '</span><b>게임' + (idx+1) + '</b> ' + g.label + '</div>';
        html += '<button class="btn-confirm" onclick=\'saveMyNumber(' + JSON.stringify(g.nums) + ',"' + g.grade + '","' + g.label + '")\'>✅ 확정</button>';
        html += '</div><div style="margin:6px 0;">';
        g.nums.forEach(n => { html += makeBall(n); });
        html += '</div><div class="pattern-info">💡 ' + g.desc + '</div>';
        html += '<div class="no-dup">✅ 1등 당첨 이력 없는 조합</div></div>';
    });
    document.getElementById('recommendations').innerHTML = html;
}

function pickNumbers(scoredList, preferNums, count, exclude) {
    let result = [], used = new Set();
    exclude.forEach(n => used.add(n));
    let sp = shuffleArray([...preferNums]);
    for (let i = 0; i < sp.length && result.length < Math.ceil(count*0.6); i++) {
        if (!used.has(sp[i])) { result.push(sp[i]); used.add(sp[i]); }
    }
    let cand = shuffleArray([...(scoredList.map(s=>s.num||s)).slice(0,25)]);
    for (let i = 0; i < cand.length && result.length < count; i++) {
        if (!used.has(cand[i])) { result.push(cand[i]); used.add(cand[i]); }
    }
    while (result.length < count) {
        let n = Math.floor(Math.random()*45)+1;
        if (!used.has(n)) { result.push(n); used.add(n); }
    }
    return result;
}

function shuffleArray(a) {
    for (let i = a.length-1; i > 0; i--) { let j = Math.floor(Math.random()*(i+1)); [a[i],a[j]] = [a[j],a[i]]; }
    return a;
}
function showPatternStats() {
    let si = 0;
    for (let i = 0; i < allData.length; i++) { if (allData[i].round >= 200) { si = i; break; } }
    let pc = {}, pe = {}, ta = 0;
    for (let i = si; i < allData.length; i++) {
        let p = analyzePattern(i);
        let k = p.match3 + '-' + p.match4 + '-' + p.match5;
        if (!pc[k]) { pc[k] = 0; pe[k] = []; }
        pc[k]++;
        if (pe[k].length < 3) pe[k].push(allData[i].round);
        ta++;
    }
    let sk = Object.keys(pc).sort((a, b) => pc[b] - pc[a]);
    let html = '<div class="msg msg-info">📊 분석: ' + ta + '회차 (200회~' + allData[allData.length-1].round + '회)</div>';
    html += '<table class="stats-table"><tr><th>순위</th><th>패턴(5등-4등-3등)</th><th>횟수</th><th>비율</th><th>등급</th><th>예시</th></tr>';
    let rank = 1;
    for (let i = 0; i < Math.min(sk.length, 15); i++) {
        let k = sk[i], pts = k.split('-');
        let p = {match3:parseInt(pts[0]), match4:parseInt(pts[1]), match5:parseInt(pts[2])};
        let g = getGrade(p), pct = (pc[k]/ta*100).toFixed(1);
        let medal = rank <= 3 ? ['🥇','🥈','🥉'][rank-1] : rank;
        html += '<tr><td>' + medal + '</td><td>' + p.match3 + '-' + p.match4 + '-' + p.match5 + '</td>';
        html += '<td><b>' + pc[k] + '</b></td><td>' + pct + '%</td>';
        html += '<td><span class="grade-badge" style="background:' + getGradeColor(g) + '">' + g + '</span></td>';
        html += '<td style="font-size:10px;color:#888;">' + pe[k].join(',') + '회</td></tr>';
        rank++;
    }
    html += '</table>';
    let gc = {S:0,A:0,B:0,C:0,D:0};
    for (let i = si; i < allData.length; i++) { gc[getGrade(analyzePattern(i))]++; }
    html += '<h3>📈 등급별 분포</h3><div class="pattern-bar">';
    let cl = {S:'#ff0000',A:'#ff6600',B:'#ffd700',C:'#00cc66',D:'#6666ff'};
    for (let g of ['S','A','B','C','D']) {
        let w = (gc[g]/ta*100);
        if (w > 0) html += '<div class="pattern-bar-item" style="width:' + Math.max(w,5) + '%;background:' + cl[g] + '">' + g + ' ' + gc[g] + '</div>';
    }
    html += '</div>';
    document.getElementById('patternStats').innerHTML = html;
}

function showHotNumbers() {
    let freq = {}; for (let i = 1; i <= 45; i++) freq[i] = 0;
    allData.slice(-100).forEach(d => { d.numbers.forEach(n => { freq[n]++; }); });
    let sorted = Object.keys(freq).map(k => ({num:parseInt(k), count:freq[k]}));
    sorted.sort((a, b) => b.count - a.count);
    let html = '<div>';
    html += '<h3>🔴 상위 15개</h3><div>';
    for (let i = 0; i < 15; i++) html += '<span class="hot-number hot-high">' + sorted[i].num + '<br><small>' + sorted[i].count + '</small></span>';
    html += '</div><h3 style="margin-top:10px;">🟡 중위 15개</h3><div>';
    for (let i = 15; i < 30; i++) html += '<span class="hot-number hot-mid">' + sorted[i].num + '<br><small>' + sorted[i].count + '</small></span>';
    html += '</div><h3 style="margin-top:10px;">🔵 하위 15개</h3><div>';
    for (let i = 30; i < 45; i++) html += '<span class="hot-number hot-low">' + sorted[i].num + '<br><small>' + sorted[i].count + '</small></span>';
    html += '</div></div>';
    document.getElementById('hotNumbers').innerHTML = html;
}

function showLastDraw() {
    let last = allData[allData.length - 1];
    let html = '<span>제 <b style="color:#ffd700;font-size:16px;">' + last.round + '</b>회</span>';
    last.numbers.forEach(n => { html += makeBall(n); });
    html += '<span style="color:#e94560;font-size:16px;margin:0 4px;">+</span>';
    html += '<span class="ball" style="background:#e94560;">' + last.bonus + '</span>';
    document.getElementById('lastDraw').innerHTML = html;
}

function showRecentData() {
    let recent = allData.slice(-20).reverse();
    let html = '<table class="stats-table"><tr><th>회차</th><th>당첨번호</th><th>보너스</th><th>패턴</th><th>등급</th></tr>';
    recent.forEach(d => {
        let idx = allData.findIndex(x => x.round === d.round);
        let p = analyzePattern(idx), g = getGrade(p);
        html += '<tr><td><b>' + d.round + '</b></td><td>';
        d.numbers.forEach(n => { html += makeBall(n); });
        html += '</td><td>' + makeBall(d.bonus) + '</td>';
        html += '<td>' + p.match3 + '-' + p.match4 + '-' + p.match5 + '</td>';
        html += '<td><span class="grade-badge" style="background:' + getGradeColor(g) + '">' + g + '</span></td></tr>';
    });
    html += '</table>';
    document.getElementById('recentData').innerHTML = html;
}

function refreshAll() {
    showLastDraw();
    generateRecommendations();
    showMyNumbers();
    checkMyMatches();
    showPatternStats();
    showHotNumbers();
    showRecentData();
    if (allData.length > 0) document.getElementById('inputRound').value = allData[allData.length-1].round + 1;
}

initData();
refreshAll();

} else {

        loadMyNumbersFromFirebase();
